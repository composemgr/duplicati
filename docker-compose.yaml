# nginx proxy address - http://172.17.0.1:8200

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  duplicati:
    image: duplicati/duplicati:latest
    container_name: duplicati-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - duplicati
    ports:
      - "8200:8200"
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${SERVICE_USER:-1000}
      PGID: ${SERVICE_GROUP:-1000}
    volumes:
      - ./rootfs/config/duplicati:/config
      - ./rootfs/data/duplicati:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  duplicati:
    external: false
